## Components

### Schemas

```yaml
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [estudiante, coordinador, admin, sysadmin]

    Student:
      type: object
      properties:
        id:
          type: string
        guarani_id:
          type: string
        name:
          type: string
        email:
          type: string
        dni:
          type: string
        role:
          type: string
        is_active:
          type: boolean

    Course:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        credits:
          type: integer
        is_integrator_exam:
          type: boolean

    Certificate:
      type: object
      properties:
        id:
          type: string
        student_id:
          type: string
        course_id:
          type: string
        issue_date:
          type: string
          format: date
        status:
          type: string
        qualification:
          type: number

    EligibilityStatus:
      type: object
      properties:
        is_eligible:
          type: boolean
        type:
          type: string
        reason:
          type: string

    PrerequisiteRule:
      type: object
      properties:
        id:
          type: string
        target_course_id:
          type: string
        source_course_ids:
          type: array
          items:
            type: string
        condition:
          type: string
          enum: [ALL, ANY]
        is_active:
          type: boolean

    IntegrationStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, warning, error]
        last_sync:
          type: string
          format: date-time
        records_synced:
          type: integer
        errors:
          type: integer

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
```

