## 1. Auth Endpoints

### POST /auth/login

**Descripción:** Iniciar sesión

```yaml
/auth/login:
  post:
    summary: Login de usuario
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email:
                type: string
                format: email
              password:
                type: string
    responses:
      '200':
        description: Login exitoso
        content:
          application/json:
            schema:
              type: object
              properties:
                access_token:
                  type: string
                refresh_token:
                  type: string
                user:
                  $ref: '#/components/schemas/User'
      '401':
        description: Credenciales inválidas
```

### POST /auth/refresh

**Descripción:** Refrescar token

```yaml
/auth/refresh:
  post:
    summary: Refrescar access token
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [refresh_token]
            properties:
              refresh_token:
                type: string
    responses:
      '200':
        description: Token refrescado
```

