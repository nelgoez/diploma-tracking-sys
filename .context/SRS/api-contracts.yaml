## 5. Enrollments Endpoints

### GET /enrollments/eligibility/{studentId}

```yaml
/enrollments/eligibility/{studentId}:
  get:
    summary: Verificar habilitación para examen final
    tags: [Enrollments]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: studentId
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Estado de habilitación
        content:
          application/json:
            schema:
              type: object
              properties:
                student_id:
                  type: string
                is_eligible:
                  type: boolean
                eligibility_type:
                  type: string
                  enum: [automatic, manual, none]
                manual_override:
                  type: object
                  nullable: true
                missing_prerequisites:
                  type: array
                  items:
                    type: string
                reason:
                  type: string
                  nullable: true
```

### POST /enrollments

```yaml
/enrollments:
  post:
    summary: Inscribirse al examen final
    tags: [Enrollments]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [exam_date]
            properties:
              exam_date:
                type: string
                format: date
              observations:
                type: string
    responses:
      '201':
        description: Inscripción exitosa
      '400':
        description: No habilitado
```

### PUT /enrollments/{id}/grade

```yaml
/enrollments/{id}/grade:
  put:
    summary: Registrar calificación (coordinador)
    tags: [Enrollments]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [qualification, status]
            properties:
              qualification:
                type: number
                minimum: 0
                maximum: 10
              status:
                type: string
                enum: [approved, disapproved, absent]
              observations:
                type: string
    responses:
      '200':
        description: Calificación registrada
```

