# API Contracts - Diploma Tracking System (OpenAPI 3.0)

> Generated from: `.prompts/fase-2-architecture/srs-api-contracts.md`
> Based on: Functional Specs + Architecture Specs
> Status: Placeholder (APIs to be implemented in Fase 3)

---

## Overview

Este archivo define los contratos de API del sistema. Todas las APIs siguen REST con JSON payloads.

### Base URL

```
Development: http://localhost:3000/api/v1
Production: https://api.diploma-tracking.unc.edu.ar/api/v1
```

### Autenticación

Todas las requests requieren header `Authorization: Bearer <token>`

### Códigos de Error Comunes

| Code | Meaning |
|------|---------|
| 400 | Bad Request - Datos inválidos |
| 401 | Unauthorized - Token inválido/expirado |
| 403 | Forbidden - Sin permisos |
| 404 | Not Found - Recurso no existe |
| 429 | Too Many Requests - Rate limit excedido |
| 500 | Internal Server Error |

