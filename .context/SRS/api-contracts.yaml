## 2. Students Endpoints

### GET /students

```yaml
/students:
  get:
    summary: Listar estudiantes (admin only)
    tags: [Students]
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
      - in: query
        name: limit
        schema:
          type: integer
          default: 20
      - in: query
        name: status
        schema:
          type: string
          enum: [active, inactive, at_risk, completed]
      - in: query
        name: search
        schema:
          type: string
    responses:
      '200':
        description: Lista de estudiantes
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Student'
                pagination:
                  $ref: '#/components/schemas/Pagination'
```

### GET /students/{id}/progress

```yaml
/students/{id}/progress:
  get:
    summary: Obtener progreso de estudiante
    tags: [Students]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Progreso del estudiante
        content:
          application/json:
            schema:
              type: object
              properties:
                student_id:
                  type: string
                track_id:
                  type: string
                courses_completed:
                  type: integer
                courses_total:
                  type: integer
                credits_accumulated:
                  type: integer
                credits_required:
                  type: integer
                progress_percentage:
                  type: number
                status:
                  type: string
                  enum: [at_risk, on_track, completed]
                eligibility_status:
                  $ref: '#/components/schemas/EligibilityStatus'
```

