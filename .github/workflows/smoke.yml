name: Smoke Tests — Daily + Allure Reports

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      generate_allure:
        description: 'Generate and deploy Allure report to GitHub Pages'
        type: boolean
        default: true

jobs:
  server-smoke:
    name: Server Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Start server + Run smoke tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MOCK_MODE: 'true'
          NODE_ENV: 'test'
        continue-on-error: true
        run: |
          bun run src/index.ts &
          sleep 3
          bun test __tests__/smoke.test.ts --timeout 15000

  client-smoke:
    name: Client Build + E2E + Allure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/bun.lock') }}

      - name: Install Playwright Chromium
        run: bun playwright install chromium --with-deps

      - name: Build
        run: bun run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Run E2E smoke tests with Allure
        continue-on-error: true
        run: ALLURE_DIR=allure-results bun run test:e2e -- --grep @smoke
        env:
          BASE_URL: 'http://localhost:5173'
          CI: 'true'

      - name: Upload Allure Results (raw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-results
          path: client/allure-results/
          retention-days: 3

  allure-report:
    name: Build & Deploy Allure Report
    needs: client-smoke
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.generate_allure != 'false') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: smoke-allure-results
          path: smoke-artifacts/allure-results
        continue-on-error: true

      - id: check_allure
        run: |
          if [ -d "smoke-artifacts/allure-results" ] && [ -n "$(ls -A smoke-artifacts/allure-results 2>/dev/null)" ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - uses: simple-elf/allure-report-action@master
        if: steps.check_allure.outputs.has_results == 'true'
        with:
          gh_pages: gh-pages
          subfolder: staging/smoke
          allure_results: smoke-artifacts/allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 3

      - uses: peaceiris/actions-gh-pages@v4
        if: steps.check_allure.outputs.has_results == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history/staging/smoke
          destination_dir: staging/smoke
          keep_files: true

      - name: Build root index
        run: |
          mkdir -p _root
          cat > _root/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Diploma Tracking System — Allure Test Reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1rem; color: #1a1a1a; }
              h1 { border-bottom: 2px solid #6366f1; padding-bottom: .5rem; }
              ul { list-style: none; padding: 0; }
              li { margin: .75rem 0; }
              a { color: #6366f1; text-decoration: none; font-size: 1.1rem; }
              a:hover { text-decoration: underline; }
              .meta { color: #666; font-size: .85rem; margin-top: 2rem; }
            </style>
          </head>
          <body>
            <h1>DTS — Test Reports</h1>
            <ul>
              <li><a href="staging/smoke/">Staging — Smoke Tests</a></li>
              <li><a href="production/smoke/">Production — Post-Deploy Smoke</a></li>
            </ul>
            <p class="meta">Generated by GitHub Actions · <code>nelgoez/diploma-tracking-sys</code></p>
          </body>
          </html>
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_root
          keep_files: true

      - run: |
          echo "## Allure Report (staging/smoke)" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/staging/smoke/" >> $GITHUB_STEP_SUMMARY
