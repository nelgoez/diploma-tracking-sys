name: Prod Validate — Post-Deploy Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      generate_allure:
        description: 'Generate and deploy Allure report to GitHub Pages'
        type: boolean
        default: true

jobs:
  prod-validate:
    name: Production Validation — @prod Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install client dependencies
        working-directory: client
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/bun.lock') }}

      - name: Install Playwright Chromium
        working-directory: client
        run: bun playwright install chromium --with-deps

      - name: Run @prod validation tests with Allure
        working-directory: client
        env:
          CI: 'true'
          ALLURE_DIR: allure-results-prod
          PROD_BASE_URL: 'https://diplomatrackingsystem.qzz.io'
          PROD_ADMIN_EMAIL: 'admin@dts.unc.edu.ar'
          PROD_ADMIN_PASSWORD: 'Admin123456!'
          PROD_STUDENT_EMAIL: 'nahuelgomez.cti@gmail.com'
          PROD_STUDENT_PASSWORD: 'Test123456!'
        run: bun validate:prod

      - name: Upload Allure Results (raw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-allure-results
          path: client/allure-results-prod/
          retention-days: 3

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-validate-report
          path: |
            client/playwright-report/
            client/test-results/
          retention-days: 7

  allure-report:
    name: Build & Deploy Allure Report
    needs: prod-validate
    if: ${{ always() && (github.event_name == 'push' || github.event.inputs.generate_allure != 'false') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: prod-allure-results
          path: prod-artifacts/allure-results
        continue-on-error: true

      - id: check_allure
        run: |
          if [ -d "prod-artifacts/allure-results" ] && [ -n "$(ls -A prod-artifacts/allure-results 2>/dev/null)" ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - uses: simple-elf/allure-report-action@master
        if: steps.check_allure.outputs.has_results == 'true'
        with:
          gh_pages: gh-pages
          subfolder: production/smoke
          allure_results: prod-artifacts/allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 3

      - uses: peaceiris/actions-gh-pages@v4
        if: steps.check_allure.outputs.has_results == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history/production/smoke
          destination_dir: production/smoke
          keep_files: true

      - name: Build root index
        run: |
          mkdir -p _root
          cat > _root/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Diploma Tracking System — Allure Test Reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px; margin: 3rem auto; padding: 0 1rem; color: #1a1a1a; }
              h1 { border-bottom: 2px solid #6366f1; padding-bottom: .5rem; }
              ul { list-style: none; padding: 0; }
              li { margin: .75rem 0; }
              a { color: #6366f1; text-decoration: none; font-size: 1.1rem; }
              a:hover { text-decoration: underline; }
              .meta { color: #666; font-size: .85rem; margin-top: 2rem; }
            </style>
          </head>
          <body>
            <h1>DTS — Test Reports</h1>
            <ul>
              <li><a href="staging/smoke/">Staging — Smoke Tests</a></li>
              <li><a href="production/smoke/">Production — Post-Deploy Smoke</a></li>
            </ul>
            <p class="meta">Generated by GitHub Actions · <code>nelgoez/diploma-tracking-sys</code></p>
          </body>
          </html>
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_root
          keep_files: true

      - run: |
          echo "## Allure Report (production/smoke)" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/production/smoke/" >> $GITHUB_STEP_SUMMARY
